id: ip-isp-v12
schema_version: "2.2"
kind: ip
category: camera
rtl_version: "12.0"
compatible_soc:
  - soc-exynos2500
hierarchy:
  type: simple
capabilities:
  operating_modes:
    - id: normal
      throughput_mpps: 500
    - id: high_throughput
      min_clock_mhz: 533.0
      throughput_mpps: 800
  supported_features:
    bitdepth: [8, 10, 12]
    hdr_formats: [HDR10, HDR10plus]
    compression: [SBWC_v4]
    crop: true
    scale: true
    rotate: false
