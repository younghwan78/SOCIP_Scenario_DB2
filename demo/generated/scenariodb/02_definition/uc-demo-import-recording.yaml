id: uc-demo-import-recording
schema_version: "2.2"
kind: scenario.usecase
project_ref: proj-demo-import
metadata:
  name: "Demo Imported Camera Recording"
  category: [camera, codec]
  domain: [camera]
pipeline:
  nodes:
    - { id: csis0, ip_ref: ip-csis-v8, instance_index: 0 }
    - { id: isp0, ip_ref: ip-isp-v12, instance_index: 0, role: main }
    - { id: mfc, ip_ref: ip-mfc-v14 }
    - { id: dpu, ip_ref: ip-dpu-v9 }
    - { id: llc, ip_ref: ip-llc-v2 }
  edges:
    - { from: csis0, to: isp0, type: OTF }
    - { from: isp0, to: mfc, type: M2M, buffer: RECORD_BUF }
    - { from: isp0, to: dpu, type: M2M, buffer: PREVIEW_BUF }
  buffers:
    RECORD_BUF:
      size_ref: record_out
      format: NV12
      bitdepth: 10
      planes: 2
      alignment: 256B
      compression: SBWC_v4
      placement:
        llc_allocated: true
        llc_allocation_mb: 1.0
        llc_policy: shared
        allocation_owner: MFC
    PREVIEW_BUF:
      size_ref: preview_out
      format: NV12
      bitdepth: 8
      planes: 2
      alignment: 128B
      compression: none
      placement:
        llc_allocated: false
        llc_policy: none
size_profile:
  anchors:
    sensor_full: "4000x3000"
    record_out: "1920x1080"
    preview_out: "1920x1080"
design_axes:
  - { name: resolution, enum: [FHD, UHD] }
  - { name: fps, enum: [30, 60] }
  - { name: codec, enum: ["H.264", "H.265"] }
variants:
  - id: FHD30-Imported
    severity: medium
    design_conditions:
      resolution: FHD
      fps: 30
      codec: "H.265"
      scenario_type: recording
    node_configs:
      isp0:
        selected_mode: normal
        operation:
          crop: false
          scale: true
          rotate: false
      mfc:
        selected_mode: normal
    buffer_overrides:
      RECORD_BUF:
        format: NV12
        compression: SBWC_v4
        placement:
          llc_allocated: true
          llc_allocation_mb: 1.0
          llc_policy: shared
          allocation_owner: MFC
