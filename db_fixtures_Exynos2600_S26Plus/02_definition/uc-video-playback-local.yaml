id: uc-video-playback-local
schema_version: '2.2'
kind: scenario.usecase
project_ref: proj-sm-s947b
metadata:
  name: Video Playback Local
  category:
  - video_playback
  - video
  domain:
  - video_playback
pipeline:
  nodes:
  - id: storage
    ip_ref: ip-cpu-s5e9965
    role: source
    instance_index: 0
  - id: mfc_dec
    ip_ref: ip-mfc-s5e9965
    role: decoder
    instance_index: 0
  - id: apv_dec
    ip_ref: ip-apv-s5e9965
    role: decoder
    instance_index: 0
  - id: drm_dec
    ip_ref: ip-cpu-s5e9965
    role: drm_decrypt
    instance_index: 0
  - id: gpu
    ip_ref: ip-gpu-s5e9965
    role: composer
    instance_index: 0
  - id: m2m_scaler
    ip_ref: ip-cpu-s5e9965
    role: m2m_scaler
    instance_index: 0
  - id: dpu
    ip_ref: ip-dpu-s5e9965
    role: display_controller
    instance_index: 0
  - id: panel
    ip_ref: ip-display-panel-s5e9965
    role: display_output
    instance_index: 0
  edges:
  - from: storage
    to: mfc_dec
    type: M2M
    buffer: ES_BUF
  - from: storage
    to: apv_dec
    type: M2M
    buffer: APV_ES_BUF
  - from: storage
    to: drm_dec
    type: M2M
    buffer: DRM_ES_BUF
  - from: drm_dec
    to: mfc_dec
    type: M2M
    buffer: DRM_DEC_BUF
  - from: mfc_dec
    to: dpu
    type: M2M
    buffer: MFC_DPU_BUF
  - from: apv_dec
    to: dpu
    type: M2M
    buffer: APV_DPU_BUF
  - from: mfc_dec
    to: gpu
    type: M2M
    buffer: MFC_GPU_BUF
  - from: gpu
    to: dpu
    type: M2M
    buffer: GPU_DPU_BUF
  - from: apv_dec
    to: m2m_scaler
    type: M2M
    buffer: APV_M2M_BUF
  - from: m2m_scaler
    to: dpu
    type: M2M
    buffer: M2M_DPU_BUF
  - from: dpu
    to: panel
    type: OTF
  buffers:
    ES_BUF:
      format: BITSTREAM
      compression: COMP_OFF
    APV_ES_BUF:
      format: BITSTREAM
      compression: COMP_OFF
    DRM_ES_BUF:
      format: BITSTREAM
      compression: COMP_OFF
    DRM_DEC_BUF:
      format: BITSTREAM
      compression: COMP_OFF
    MFC_DPU_BUF:
      format: YUV420
      bitdepth: 8
      compression: COMP_OFF
    APV_DPU_BUF:
      format: YUV422
      bitdepth: 10
      compression: COMP_OFF
    MFC_GPU_BUF:
      format: YUV420
      bitdepth: 8
      compression: COMP_OFF
    GPU_DPU_BUF:
      format: RGBA8888
      bitdepth: 8
      compression: COMP_OFF
    APV_M2M_BUF:
      format: YUV422
      bitdepth: 10
      compression: COMP_OFF
    M2M_DPU_BUF:
      format: RGBA8888
      bitdepth: 8
      compression: COMP_OFF
