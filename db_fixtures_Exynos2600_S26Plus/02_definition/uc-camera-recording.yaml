    instance_index: 0
  - id: byrp
    ip_ref: ip-isp-s5e9965
    role: bayer_processing
    instance_index: 0
  - id: rgbp
    ip_ref: ip-isp-s5e9965
    role: rgb_processing
    instance_index: 0
  - id: yuvsc
    ip_ref: ip-isp-s5e9965
    role: yuv_scaler
    instance_index: 0
  - id: mtnr
    ip_ref: ip-isp-s5e9965
    role: temporal_nr
    instance_index: 0
  - id: msnr
    ip_ref: ip-isp-s5e9965
    role: spatial_nr
    instance_index: 0
