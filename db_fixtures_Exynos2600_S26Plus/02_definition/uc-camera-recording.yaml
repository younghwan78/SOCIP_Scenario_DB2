  - from: sensor_rear
    to: csispdp
    type: OTF
  - from: sensor_rear2
    to: csispdp
    type: OTF
  - from: sensor_rear3
    to: csispdp
    type: OTF
  - from: sensor_front
    to: csispdp
    type: OTF
  - from: csispdp
    to: byrp
    type: OTF
  - from: byrp
    to: rgbp
    type: OTF
  - from: rgbp
    to: yuvsc
    type: OTF
  - from: yuvsc
    to: mtnr
    type: M2M
    buffer: YUVSC_MTNR_BUF
  - from: mtnr
    to: msnr
    type: OTF
  - from: msnr
    to: yuvp
    type: OTF
  - from: yuvp
    to: mcsc
    type: OTF
  - from: csispdp
    to: n3aa
    type: M2M
    buffer: CSISPDP_3AA_BUF
  - from: lme
    to: mtnr
    type: M2M
    buffer: LME_MTNR_BUF
  - from: csispdp
    to: npu
    type: M2M
    buffer: CSISPDP_NPU_BUF
  - from: npu
    to: mtnr
    type: M2M
    buffer: NPU_MTNR_BUF
  - from: mcsc
    to: gdc_m
    type: M2M
    buffer: MCSC_WDMA_PREV_BUF
  - from: mcsc
    to: eis
    type: M2M
    buffer: MCSC_WDMA_EIS_BUF
  - from: eis
    to: gdc_m
    type: M2M
    buffer: EIS_GDC_M_BUF
  - from: mcsc
    to: gdc_o
    type: M2M
    buffer: MCSC_WDMA_VIDEO_BUF
  - from: eis
    to: gdc_o
    type: M2M
    buffer: EIS_GDC_O_BUF
  - from: gdc_m
    to: dpu
    type: M2M
    buffer: GDC_M_DPU_BUF
  - from: gdc_o
    to: mfc_enc
    type: M2M
    buffer: GDC_O_MFC_BUF
  - from: dpu
    to: panel
    type: OTF
  buffers:
    CSISPDP_3AA_BUF:
      format: RAW_BAYER_16
      bitdepth: 12
      compression: COMP_BAYER_LOSSLESS
    YUVSC_MTNR_BUF:
      format: YUV422
      bitdepth: 10
      compression: COMP_OFF
    LME_MTNR_BUF:
      format: MV
      compression: COMP_OFF
    CSISPDP_NPU_BUF:
      format: RAW_BAYER_16
      bitdepth: 10
      compression: COMP_BAYER_LOSSY
    NPU_MTNR_BUF:
      format: YUV422
      bitdepth: 10
      compression: COMP_OFF
    MCSC_WDMA_PREV_BUF:
      format: YUV420
      bitdepth: 8
      compression: COMP_OFF
    MCSC_WDMA_VIDEO_BUF:
      format: YUV420
      bitdepth: 8
      compression: COMP_OFF
    MCSC_WDMA_EIS_BUF:
      format: YUV420
      bitdepth: 8
      compression: COMP_OFF
    EIS_GDC_M_BUF:
      format: YUV420
      bitdepth: 8
      compression: COMP_OFF
    EIS_GDC_O_BUF:
      format: YUV420
      bitdepth: 8
      compression: COMP_OFF
    GDC_M_DPU_BUF:
      format: YUV420
      bitdepth: 8
      compression: COMP_SBWC_LOSSLESS
    GDC_O_MFC_BUF:
      format: YUV420
      bitdepth: 8
      compression: COMP_SBWC_LOSSLESS
