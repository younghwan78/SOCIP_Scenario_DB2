id: uc-youtube-playback
schema_version: '2.2'
kind: scenario.usecase
project_ref: proj-sm-s947b
metadata:
  name: YouTube Playback
  category:
  - video_playback
  - video
  domain:
  - video_playback
pipeline:
  nodes:
  - id: network
    ip_ref: ip-cpu-s5e9965
    role: source
    instance_index: 0
  - id: sw_demux
    ip_ref: ip-cpu-s5e9965
    role: demux
    instance_index: 0
  - id: mfc_dec
    ip_ref: ip-mfc-s5e9965
    role: decoder
    instance_index: 0
  - id: gpu
    ip_ref: ip-gpu-s5e9965
    role: composer
    instance_index: 0
  - id: m2m_scaler
    ip_ref: ip-cpu-s5e9965
    role: m2m_scaler
    instance_index: 0
  - id: dpu
    ip_ref: ip-dpu-s5e9965
    role: display_controller
    instance_index: 0
  - id: panel
    ip_ref: ip-display-panel-s5e9965
    role: display_output
    instance_index: 0
  edges:
  - from: network
    to: sw_demux
    type: M2M
  - from: sw_demux
    to: mfc_dec
    type: M2M
    buffer: NET_ES_BUF
  - from: mfc_dec
    to: dpu
    type: M2M
    buffer: MFC_DPU_BUF
  - from: mfc_dec
    to: gpu
    type: M2M
    buffer: MFC_GPU_BUF
  - from: gpu
    to: dpu
    type: M2M
    buffer: GPU_DPU_BUF
  - from: mfc_dec
    to: m2m_scaler
    type: M2M
    buffer: MFC_M2M_BUF
  - from: m2m_scaler
    to: dpu
    type: M2M
    buffer: M2M_DPU_BUF
  - from: dpu
    to: panel
    type: OTF
  buffers:
    NET_ES_BUF:
      format: BITSTREAM
      compression: COMP_OFF
    MFC_DPU_BUF:
      format: YUV420
      bitdepth: 8
      compression: COMP_OFF
    MFC_GPU_BUF:
      format: YUV420
      bitdepth: 8
      compression: COMP_OFF
    GPU_DPU_BUF:
      format: RGBA8888
      bitdepth: 8
      compression: COMP_OFF
    MFC_M2M_BUF:
      format: YUV420
      bitdepth: 8
      compression: COMP_OFF
    M2M_DPU_BUF:
      format: RGBA8888
      bitdepth: 8
      compression: COMP_OFF
