id: uc-camera-capture
schema_version: '2.2'
kind: scenario.usecase
project_ref: proj-sm-s947b
metadata:
  name: Camera Capture
  category:
  - camera
  domain:
  - camera
pipeline:
  nodes:
  - id: sensor_rear
    ip_ref: ip-sensor-rear-s5e9965
    role: sensor
    instance_index: 0
  - id: sensor_rear2
    ip_ref: ip-sensor-rear-s5e9965
    role: sensor
    instance_index: 0
  - id: sensor_front
    ip_ref: ip-sensor-front-s5e9965
    role: sensor
    instance_index: 0
  - id: csispdp
    ip_ref: ip-isp-s5e9965
    role: csispdp
    instance_index: 0
  - id: n3aa
    ip_ref: ip-isp-s5e9965
    role: 3aa_stats
    instance_index: 0
  - id: byrp
    ip_ref: ip-isp-s5e9965
    role: byrp
    instance_index: 0
  - id: rgbp
    ip_ref: ip-isp-s5e9965
    role: rgbp
    instance_index: 0
  - id: yuvsc
    ip_ref: ip-isp-s5e9965
    role: yuvsc
    instance_index: 0
  - id: mtnr
    ip_ref: ip-isp-s5e9965
    role: mtnr
    instance_index: 0
  - id: msnr
    ip_ref: ip-isp-s5e9965
    role: msnr
    instance_index: 0
  - id: yuvp
    ip_ref: ip-isp-s5e9965
    role: yuvp
    instance_index: 0
  - id: mcsc
    ip_ref: ip-mcsc-s5e9965
    role: mcsc
    instance_index: 0
  - id: npu
    ip_ref: ip-npu-s5e9965
    role: npu
    instance_index: 0
  - id: post_proc
    ip_ref: ip-cpu-s5e9965
    role: jpeg_encode
    instance_index: 0
  - id: storage
    ip_ref: ip-cpu-s5e9965
    role: storage_sink
    instance_index: 0
  edges:
  - from: sensor_rear
    to: csispdp
    type: OTF
  - from: sensor_rear2
    to: csispdp
    type: OTF
  - from: sensor_front
    to: csispdp
    type: OTF
  - from: csispdp
    to: byrp
    type: OTF
  - from: byrp
    to: rgbp
    type: OTF
  - from: rgbp
    to: yuvsc
    type: OTF
  - from: yuvsc
    to: mtnr
    type: M2M
    buffer: YUVSC_MTNR_BUF
  - from: mtnr
    to: msnr
    type: OTF
  - from: msnr
    to: yuvp
    type: OTF
  - from: yuvp
    to: mcsc
    type: OTF
  - from: csispdp
    to: n3aa
    type: M2M
    buffer: CSISPDP_3AA_BUF
  - from: csispdp
    to: npu
    type: M2M
    buffer: CSISPDP_NPU_BUF
  - from: npu
    to: mtnr
    type: M2M
    buffer: NPU_MTNR_BUF
  - from: mcsc
    to: post_proc
    type: M2M
    buffer: MCSC_WDMA_CAP_BUF
  - from: post_proc
    to: storage
    type: M2M
    buffer: JPEG_BUF
  buffers:
    YUVSC_MTNR_BUF:
      format: YUV420
      bitdepth: 10
      compression: COMP_OFF
      note: M2M break — multi-frame TNR input
    CSISPDP_3AA_BUF:
      format: BAYER
      bitdepth: 10
      compression: COMP_OFF
      note: 3A stats sidecar
    CSISPDP_NPU_BUF:
      format: YUV420
      bitdepth: 10
      compression: COMP_OFF
      note: AI remosaic NPU input
    NPU_MTNR_BUF:
      format: YUV420
      bitdepth: 10
      compression: COMP_OFF
      note: NPU → MTNR AI pre-processed
    MCSC_WDMA_CAP_BUF:
      format: YUV420
      bitdepth: 10
      compression: COMP_BAYER_LOSSLESS
      note: MCSC OUTPUT2 capture WDMA — full/high-res size
    ZSL_RING_BUF:
      format: YUV420
      bitdepth: 10
      compression: COMP_BAYER_LOSSLESS
      note: ZSL ring buffer (capture 직전 N프레임 보관)
    JPEG_BUF:
      format: JPEG
      bitdepth: 8
      compression: COMP_OFF
      note: JPEG encoded output
variants:
- id: cam-cap-r1-sf
  severity: light
  design_conditions:
    subscenario: STILL_SF_CAPTURE
    dvfs_sn: IS_DVFS_SN_REAR_SINGLE_CAPTURE
    sensor_place: rear
    capture_type: ZSL
    capture_hint: none
    flash: false
    extend_mode: EX_NONE
  routing_switch:
    disabled_nodes:
    - sensor_rear2
    - sensor_front
    - npu
    disabled_edges:
    - from: sensor_rear2
      to: csispdp
    - from: sensor_front
      to: csispdp
    - from: csispdp
      to: npu
    - from: npu
      to: mtnr
  node_configs:
    mtnr:
      selected_mode: Capture_SF
  buffer_overrides:
    MCSC_WDMA_CAP_BUF:
