metadata:
  name: Camera Preview
  category:
  - camera
  domain:
  - camera
pipeline:
  nodes:
  - id: sensor_rear
    ip_ref: ip-sensor-rear-s5e9965
    role: sensor
    instance_index: 0
  - id: sensor_rear2
    ip_ref: ip-sensor-rear-s5e9965
    role: sensor
    instance_index: 0
  - id: sensor_rear3
    ip_ref: ip-sensor-rear-s5e9965
    role: sensor
    instance_index: 0
  - id: sensor_front
    ip_ref: ip-sensor-front-s5e9965
    role: sensor
    instance_index: 0
  - id: csispdp
    ip_ref: ip-isp-s5e9965
    role: csispdp
    instance_index: 0
  - id: n3aa
    ip_ref: ip-isp-s5e9965
    role: 3aa_stats
    instance_index: 0
  - id: byrp
    ip_ref: ip-isp-s5e9965
    role: byrp
    instance_index: 0
  - id: rgbp
    ip_ref: ip-isp-s5e9965
    role: rgbp
    instance_index: 0
  - id: yuvsc
    ip_ref: ip-isp-s5e9965
    role: yuvsc
    instance_index: 0
  - id: mtnr
    ip_ref: ip-isp-s5e9965
    role: mtnr
    instance_index: 0
  - id: msnr
    ip_ref: ip-isp-s5e9965
    role: msnr
    instance_index: 0
  - id: yuvp
    ip_ref: ip-isp-s5e9965
    role: yuvp
    instance_index: 0
  - id: mcsc
    ip_ref: ip-mcsc-s5e9965
    role: mcsc
    instance_index: 0
  - id: npu
    ip_ref: ip-npu-s5e9965
    role: npu
    instance_index: 0
  - id: eis
    ip_ref: ip-cpu-s5e9965
    role: eis_stabilization
    instance_index: 0
  - id: gdc_m
    ip_ref: ip-isp-s5e9965
    role: gdc_preview
    instance_index: 0
  - id: dpu
    ip_ref: ip-dpu-s5e9965
    role: display_controller
    instance_index: 0
  - id: panel
    ip_ref: ip-display-panel-s5e9965
    role: display_output
    instance_index: 0
  edges:
  - from: sensor_rear
    to: csispdp
    type: OTF
  - from: sensor_rear2
    to: csispdp
    type: OTF
  - from: sensor_rear3
    to: csispdp
    type: OTF
  - from: sensor_front
    to: csispdp
    type: OTF
  - from: csispdp
    to: byrp
    type: OTF
  - from: byrp
    to: rgbp
    type: OTF
  - from: rgbp
    to: yuvsc
    type: OTF
  - from: yuvsc
    to: mtnr
    type: M2M
    buffer: YUVSC_MTNR_BUF
  - from: mtnr
    to: msnr
    type: OTF
  - from: msnr
    to: yuvp
    type: OTF
  - from: yuvp
    to: mcsc
    type: OTF
  - from: csispdp
    to: n3aa
    type: M2M
    buffer: CSISPDP_3AA_BUF
  - from: csispdp
    to: npu
    type: M2M
    buffer: CSISPDP_NPU_BUF
  - from: npu
    to: mtnr
    type: M2M
    buffer: NPU_MTNR_BUF
  - from: mcsc
    to: gdc_m
    type: M2M
    buffer: MCSC_WDMA_PREV_BUF
  - from: mcsc
    to: eis
    type: M2M
    buffer: MCSC_WDMA_PREV_BUF
  - from: eis
    to: gdc_m
    type: M2M
    buffer: EIS_GDC_M_BUF
  - from: gdc_m
    to: dpu
    type: M2M
    buffer: GDC_M_DPU_BUF
  - from: dpu
    to: panel
    type: OTF
  buffers:
    YUVSC_MTNR_BUF:
      format: YUV420
      bitdepth: 10
      compression: COMP_OFF
      note: M2M break — multi-frame TNR input
    CSISPDP_3AA_BUF:
      format: BAYER
      bitdepth: 10
      compression: COMP_OFF
      note: 3A stats sidecar
    CSISPDP_NPU_BUF:
      format: YUV420
      bitdepth: 10
      compression: COMP_OFF
      note: AI remosaic / AI-AF NPU input
    NPU_MTNR_BUF:
      format: YUV420
      bitdepth: 10
      compression: COMP_OFF
      note: NPU → MTNR AI pre-processed
    MCSC_WDMA_PREV_BUF:
      format: YUV420
      bitdepth: 10
      compression: COMP_OFF
      note: MCSC OUTPUT0 preview WDMA — larger than display (EIS margin)
    EIS_GDC_M_BUF:
      format: YUV420
      bitdepth: 10
      compression: COMP_OFF
      note: EIS warp map + frame → GDC_M
    GDC_M_DPU_BUF:
      format: YUV420
      bitdepth: 10
      compression: COMP_SBWC_LOSSLESS
      note: GDC_M crop/warp output → DPU (SBWC zero-copy)
